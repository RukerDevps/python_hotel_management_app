services:
  - type: web
    name: hotel-management-django
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn HMS_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
